name: Build Firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [esp32c5, esp32c6]
    container:
      image: espressif/idf:v5.5.1
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target ${{ matrix.target }}
          idf.py build

      - name: Create merged firmware binary
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd build
          esptool.py --chip ${{ matrix.target }} merge_bin \
            -o wendy_mcu_${{ matrix.target }}.bin \
            --flash_mode dio \
            --flash_size 4MB \
            @flash_args

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wendy_mcu_${{ matrix.target }}
          path: build/wendy_mcu_${{ matrix.target }}.bin

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Attach firmware to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wendy_mcu_esp32c5/wendy_mcu_esp32c5.bin
            wendy_mcu_esp32c6/wendy_mcu_esp32c6.bin
